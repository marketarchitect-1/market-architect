<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Market Architect</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0a0a0a;
      --line: rgba(255, 255, 255, 0.08);
      --text: #f4f1ea;
      --muted: rgba(244, 241, 234, 0.72);
      --gold: #c89b5a;
      --silver: #d8d4cf;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body {
      min-height: 100vh;
      background:
        linear-gradient(to right, transparent 24.9%, var(--line) 25%, transparent 25.1%),
        linear-gradient(to bottom, transparent 49.9%, var(--line) 50%, transparent 50.1%),
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.04), transparent 30%),
        var(--bg);
    }

    .page {
      min-height: 100vh;
      padding: 36px 48px 24px;
      position: relative;
      overflow: hidden;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: relative;
      z-index: 10;
    }

    .brand h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .brand p {
      margin: 6px 0 0;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.18em;
    }

    .nav {
      display: flex;
      gap: 36px;
    }

    .nav a {
      color: var(--muted);
      text-decoration: none;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .nav a:hover {
      color: var(--text);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.15fr 0.95fr 0.9fr;
      align-items: center;
      min-height: calc(100vh - 120px);
      gap: 32px;
      position: relative;
      z-index: 2;
    }

    .hero-left {
      position: relative;
      height: 680px;
    }

    .hanja-wrap {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .hanja-circle {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 420px;
      height: 420px;
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 50%;
      transform: translate(-50%, -62%);
    }

    .hanja-top {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -68%);
      font-family: "Noto Serif KR", serif;
      font-size: 16rem;
      line-height: 1;
      color: var(--gold);
      opacity: 0.96;
    }

    .hanja-box {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 420px;
      height: 300px;
      border: 1px solid rgba(255,255,255,0.08);
      transform: translate(-50%, 4%);
    }

    .hanja-bottom {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, 32%);
      font-family: "Noto Serif KR", serif;
      font-size: 14rem;
      line-height: 1;
      color: var(--silver);
      opacity: 0.96;
    }

    .hero-center {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 96px;
    }

    .hero-copy {
      margin: 0;
      font-family: "Noto Serif KR", serif;
      font-size: 3.45rem;
      line-height: 1.28;
      letter-spacing: -0.045em;
    }

    .accent {
      color: var(--gold);
    }

    .hero-right {
      display: flex;
      justify-content: flex-start;
    }

    .intro-box {
      border-left: 1px solid rgba(255,255,255,0.10);
      padding-left: 44px;
      max-width: 420px;
    }

    .intro-box h2 {
      margin: 0 0 20px;
      color: var(--gold);
      font-size: 2rem;
      line-height: 1.35;
      letter-spacing: -0.03em;
    }

    .intro-box p {
      margin: 0 0 40px;
      color: var(--muted);
      font-size: 1.08rem;
      line-height: 1.85;
    }

    .feature-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .feature-list li {
      position: relative;
      margin-bottom: 22px;
      padding-left: 20px;
      font-size: 1rem;
      color: var(--text);
      letter-spacing: 0.06em;
    }

    .feature-list li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 9px;
      width: 8px;
      height: 8px;
      border: 1px solid var(--gold);
      transform: rotate(45deg);
    }

    .scroll-text {
      position: absolute;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.3em;
    }

    @media (max-width: 1200px) {
      .hero {
        grid-template-columns: 1fr;
        gap: 24px;
      }

      .hero-left {
        height: 520px;
      }

      .hero-center {
        gap: 32px;
      }

      .hero-copy {
        font-size: 2.6rem;
      }

      .intro-box {
        border-left: none;
        padding-left: 0;
        border-top: 1px solid rgba(255,255,255,0.10);
        padding-top: 28px;
      }

      .nav {
        display: none;
      }
    }

    @media (max-width: 768px) {
      .page {
        padding: 24px 20px;
      }

      .hero-left {
        height: 420px;
      }

      .hanja-circle {
        width: 260px;
        height: 260px;
        transform: translate(-50%, -68%);
      }

      .hanja-top {
        font-size: 9rem;
        transform: translate(-50%, -74%);
      }

      .hanja-box {
        width: 260px;
        height: 190px;
        transform: translate(-50%, -2%);
      }

      .hanja-bottom {
        font-size: 8rem;
        transform: translate(-50%, 25%);
      }

      .hero-copy {
        font-size: 2rem;
      }

      .intro-box h2 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="brand">
        <h1>market-architect</h1>
        <p>MARKETING PORTFOLIO</p>
      </div>

      <nav class="nav">
        <a href="#about">ABOUT</a>
        <a href="#approach">APPROACH</a>
        <a href="#case-study">CASE STUDY</a>
        <a href="#thinking">THINKING</a>
        <a href="#contact">CONTACT</a>
      </nav>
    </header>

    <main class="hero">
      <section class="hero-left">
        <div class="hanja-wrap">
          <div class="hanja-circle"></div>
          <div class="hanja hanja-top">感</div>
          <div class="hanja-box"></div>
          <div class="hanja hanja-bottom">計</div>
        </div>
      </section>

      <section class="hero-center">
        <p class="hero-copy">
          <span class="accent">감각</span>으로<br />
          기회를 포착하고
        </p>

        <p class="hero-copy">
          매출 <span class="accent">구조</span>를<br />
          설계합니다
        </p>
      </section>

      <aside class="hero-right">
        <div class="intro-box">
          <h2>매출 구조를 설계하는 마케터</h2>
          <p>
            본능적 인사이트로 시장의 흐름을 읽고,<br />
            전략적 구조 설계로 성과를 만듭니다.
          </p>

          <ul class="feature-list">
            <li>MARKET INSIGHT</li>
            <li>STRUCTURE DESIGN</li>
            <li>PERFORMANCE GROWTH</li>
          </ul>
        </div>
      </aside>
    </main>

    <div class="scroll-text">SCROLL</div>
  </div>
</body>
</html>
